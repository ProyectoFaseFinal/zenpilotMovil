name: zenpilot_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # Para manejar estado
  provider: ^6.1.2
  
  # Asistente de Voz IA y utilidades
  speech_to_text: ^7.0.0
